# ── Редирект HTTP → HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    server_name x-opt.ru www.x-opt.ru;

    # Health check должен оставаться на HTTP для Docker healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Основной серверный блок (HTTPS) ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name x-opt.ru www.x-opt.ru;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS — строгая транспортная безопасность
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Эндпоинт health check для мониторинга / балансировщиков ────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Статика Next.js (_next/static) — неизменяемая, долгий кэш ─────
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=static burst=50 nodelay;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status "STATIC";

        access_log off;
    }

    # ── Публичные статические файлы (favicon, картинки, шрифты и т.д.) ─
    location ~* \.(ico|png|jpg|jpeg|gif|webp|avif|svg|woff|woff2|ttf|otf|eot|css|js|map)$ {
        proxy_pass http://frontend:3000;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=static burst=50 nodelay;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Cache-Status "ASSET";

        access_log off;
    }

    # ── Оптимизация изображений Next.js ───────────────────────────────
    location /_next/image {
        proxy_pass http://frontend:3000;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=general burst=20 nodelay;

        expires 60d;
        add_header Cache-Control "public, max-age=5184000";
    }

    # ── Data-маршруты Next.js (__next_data) ────────────────────────────
    location /_next/data/ {
        proxy_pass http://frontend:3000;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=general burst=20 nodelay;

        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ── API запросы → Backend ──────────────────────────────────────────
    location /api {
        proxy_pass http://backend:8080;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=general burst=20 nodelay;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Все остальные запросы → Next.js ────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        limit_req zone=general burst=20 nodelay;

        # Отключаем кэширование HTML-страниц (Next.js управляет кэшем сам)
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ── Блокировка скрытых файлов (.env, .git и т.д.) ─────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Кастомные страницы ошибок ─────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
