# ─────────────────────────────────────────────────────────────
# HTTP -> HTTPS
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name price05.ru www.price05.ru;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS
# ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name price05.ru www.price05.ru;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─────────────────────────────────────────────────────────
    # Healthcheck
    # ─────────────────────────────────────────────────────────

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    
    # ─────────────────────────────────────────────────────────
    # Swagger UI
    # ─────────────────────────────────────────────────────────
    # Swagger будет доступен:
    # https://price05.ru/swagger/
    #
    # Если swagger работает внутри backend:
    # http://backend:8080/swagger/

    location /api/swagger-ui/ {
        proxy_pass http://backend:8080/api/swagger-ui/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI docs
    location /api/v3/api-docs {
        proxy_pass http://backend:8080/api/v3/api-docs;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────
    # Next.js static
    # ─────────────────────────────────────────────────────────

    location /_next/static/ {
        proxy_pass http://smart_queue_web:3000;

        expires 365d;

        add_header Cache-Control "public, max-age=31536000, immutable";

        access_log off;
    }

    # ─────────────────────────────────────────────────────────
    # Next.js image optimizer
    # ─────────────────────────────────────────────────────────

    location /_next/image {
        proxy_pass http://smart_queue_web:3000;
    }

    # ─────────────────────────────────────────────────────────
    # Backend API
    # ─────────────────────────────────────────────────────────

    location /backend/ {
        proxy_pass http://backend:8080/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
    }

    # ─────────────────────────────────────────────────────────
    # Next.js app + route handlers
    # ─────────────────────────────────────────────────────────

    location / {
        proxy_pass http://smart_queue_web:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        proxy_buffering off;
    }

    # ─────────────────────────────────────────────────────────
    # Block hidden files
    # ─────────────────────────────────────────────────────────

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
