services:
  web:
    container_name: smart_queue_web
    image: ${DOCKER_FRONTEND_IMAGE}:latest
    restart: always
    networks:
      - internal-network
      - backend-network  # сеть бэкенда — нужна чтобы NextAuth мог достучиться до backend:8080
    environment:
      - NODE_ENV=production
      # Внутренний адрес бэкенда — используется NextAuth для authorize()
      # чтобы не было петли через публичный nginx
      - API_URL=http://backend:8080
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    container_name: smart_queue_nginx
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - internal-network
      - external-network
    depends_on:
      web:
        # Nginx запустится только когда frontend пройдёт health check
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/healthz",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Внутренняя сеть между контейнерами
  internal-network:
    driver: bridge
  # Внешняя сеть для доступа извне
  external-network:
    driver: bridge
  # Сеть бэкенда — должна совпадать с именем сети в docker-compose бэкенда
  backend-network:
    external: true
    name: smart-queue-api_app-network
