version: "3.8"

services:
  frontend:
    container_name: smart_queue_web
    image: ${DOCKER_FRONTEND_IMAGE}:latest
    restart: always
    networks:
      - internal-network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    container_name: smart_queue_nginx
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - internal-network
      - external-network
    depends_on:
      frontend:
        # Nginx запустится только когда frontend пройдёт health check
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Внутренняя сеть между контейнерами
  internal-network:
    driver: bridge
  # Внешняя сеть для доступа извне
  external-network:
    driver: bridge
